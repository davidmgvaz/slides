name: Deploy slides to GitHub Pages

# Builds every Slidev deck in the repo and publishes them to GitHub Pages.
# Each deck is a top-level folder; it is served at /slides/<folder>/.
# The landing page (index.html) is served at /slides/.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build boostinc-django52-pitch-deck
        working-directory: boostinc-django52-pitch-deck
        run: |
          npm install
          npx slidev build --base /slides/boostinc-django52-pitch-deck/ --out ../dist/boostinc-django52-pitch-deck

      # --- add a `npx slidev build ...` block per deck as the repo grows ---

      - name: Add landing page
        run: cp index.html dist/index.html

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
